name: german_loop
description: GermanLoop — Personal German speaking practice for English beginners.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.3+1

  # Audio recording
  record: ^6.0.0

  # Audio playback
  just_audio: ^0.9.40

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  path_provider: ^2.1.3
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true


